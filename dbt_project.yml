# dbt Configuration File
name: 'dbt_learn_project'
version: '1.0.0'
config-version: 2

# Profile for database connection
profile: 'dbt_learn_project'

# Model paths
model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Models configuration
models:
  dbt_learn_project:
    materialized: table
    staging:
      +materialized: view
    marts:
      +materialized: table
